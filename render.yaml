services:
  - type: web
    name: tg-video-rounded-bot
    runtime: python
    buildCommand: |
      apt-get update && apt-get install -y ffmpeg
      pip install -r requirements.txt
    startCommand: python bot.py
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false       # paste your token in Render dashboard
      - key: WEBHOOK_URL
        sync: false       # e.g. https://tg-video-rounded-bot.onrender.com
